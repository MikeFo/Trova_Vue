# Netlify config so SPA routes (e.g. /communities/:id/console) are served correctly.
# Without this, direct requests to those paths return Netlify's 404.

[build]
  publish = "dist"
  command = "npm run build:prod"

# Use the staging build when deploying the `staging` branch (for vue.trova-staging.com).
[context."branch:staging"]
  command = "npm run build:staging"

# SPA fallback: serve index.html for all paths so Vue Router can handle them.
# Status 200 = rewrite (URL stays the same), not a redirect.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Baseline security headers (avoid X-Frame-Options: DENY until iframe embed requirements are confirmed)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
